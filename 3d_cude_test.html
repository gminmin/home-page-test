<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>3D 정육면체 애니메이션 테스트</title>
    <link rel="stylesheet" href="style.css?v=2026-04-25-1">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #F0FAFA;
            overflow: hidden;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .container-test {
            text-align: center;
            position: relative;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            /* background: rgba(255, 255, 255, 0.4); */
            /* backdrop-filter: blur(10px); */
        }

        .controls {
            margin-top: 2rem;
            animation: fadeUp 1s ease both;
        }

        .status-text {
            font-size: 0.9rem;
            color: #5D68A6;
            margin-top: 1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container-test">
    <canvas id="cubeCanvas"></canvas>
    <div class="controls">
        <button class="btn btn-primary" onclick="restartAnimation()">애니메이션 재생</button>
        <p class="status-text" id="statusLabel">정점 활성화 중...</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('cubeCanvas');
    const ctx = canvas.getContext('2d');
    const statusLabel = document.getElementById('statusLabel');

    let width, height;
    function resize() {
        width = canvas.width = 600;
        height = canvas.height = 600;
    }
    resize();

    // 3D 정육면체 데이터
    const vertices = [
        { x: -1, y: -1, z: -1 }, // 0
        { x:  1, y: -1, z: -1 }, // 1
        { x:  1, y:  1, z: -1 }, // 2
        { x: -1, y:  1, z: -1 }, // 3
        { x: -1, y: -1, z:  1 }, // 4
        { x:  1, y: -1, z:  1 }, // 5
        { x:  1, y:  1, z:  1 }, // 6
        { x: -1, y:  1, z:  1 }  // 7
    ];

    const edges = [
        [0, 1], [1, 2], [2, 3], [3, 0], // 뒤쪽
        [4, 5], [5, 6], [6, 7], [7, 4], // 앞쪽
        [0, 4], [1, 5], [2, 6], [3, 7]  // 연결선
    ];

    let animationTime = 0;
    let rotationX = 0.5;
    let rotationY = 0.5;
    let isDragging = false;
    let lastMouseX = 0;
    let lastMouseY = 0;

    // 단계별 애니메이션 상태
    let vertexProgress = 0; // 0 to vertices.length
    let edgeProgress = 0;   // 0 to edges.length

    // 마우스 이벤트 리스너
    canvas.addEventListener('mousedown', (e) => {
        isDragging = true;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
        canvas.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        
        const deltaX = e.clientX - lastMouseX;
        const deltaY = e.clientY - lastMouseY;
        
        // 마우스 이동량에 따라 회전값 변경
        rotationY += deltaX * 0.01;
        rotationX += deltaY * 0.01;
        
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
        canvas.style.cursor = 'grab';
    });

    // 초기 커서 설정
    canvas.style.cursor = 'grab';

    function rotate(point, rx, ry) {
        // Y축 회전
        let x = point.x * Math.cos(ry) - point.z * Math.sin(ry);
        let z = point.x * Math.sin(ry) + point.z * Math.cos(ry);
        let y = point.y;

        // X축 회전
        let newY = y * Math.cos(rx) - z * Math.sin(rx);
        let newZ = y * Math.sin(rx) + z * Math.cos(rx);

        return { x, y: newY, z: newZ };
    }

    function project(point) {
        const perspective = 400;
        const scale = 150;
        const zOff = 4.0;
        
        const factor = scale * (perspective / (perspective + (point.z + zOff) * 100));
        return {
            x: width / 2 + point.x * factor,
            y: height / 2 + point.y * factor
        };
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        
        animationTime += 0.01;
        
        // 드래그 중이 아닐 때만 자동 회전
        if (!isDragging) {
            rotationX += 0.005;
            rotationY += 0.008;
        }

        // 애니메이션 시퀀스 제어
        if (vertexProgress < vertices.length) {
            vertexProgress += 0.05;
            statusLabel.innerText = "정점 생성 중 (" + Math.floor(vertexProgress) + "/8)";
        } else if (edgeProgress < edges.length) {
            edgeProgress += 0.08;
            statusLabel.innerText = "선 연결 중 (" + Math.floor(edgeProgress) + "/12)";
        } else {
            statusLabel.innerText = "동아리 정육면체 완성! (마우스로 돌려보세요)";
        }

        const currentVertices = vertices.map(v => project(rotate(v, rotationX, rotationY)));

        // 선(Edges) 그리기
        ctx.lineWidth = 3;
        const currentEdgeIdx = Math.floor(edgeProgress);
        for (let i = 0; i < currentEdgeIdx; i++) {
            const [startIdx, endIdx] = edges[i];
            const start = currentVertices[startIdx];
            const end = currentVertices[endIdx];

            // 그라데이션 선
            const grad = ctx.createLinearGradient(start.x, start.y, end.x, end.y);
            grad.addColorStop(0, '#04ADC0');
            grad.addColorStop(1, '#5D68A6');
            
            ctx.strokeStyle = grad;
            ctx.beginPath();
            ctx.moveTo(start.x, start.y);
            ctx.lineTo(end.x, end.y);
            ctx.stroke();
        }

        // 부분적으로 그려지는 선 처리
        if (edgeProgress > 0 && edgeProgress < edges.length) {
            const i = currentEdgeIdx;
            const subProgress = edgeProgress - i;
            const [startIdx, endIdx] = edges[i];
            const start = currentVertices[startIdx];
            const end = currentVertices[endIdx];

            const currentX = start.x + (end.x - start.x) * subProgress;
            const currentY = start.y + (end.y - start.y) * subProgress;

            ctx.strokeStyle = '#04ADC0';
            ctx.beginPath();
            ctx.moveTo(start.x, start.y);
            ctx.lineTo(currentX, currentY);
            ctx.stroke();
        }

        // 점(Vertices) 그리기
        const currentVertexIdx = Math.floor(vertexProgress);
        for (let i = 0; i < currentVertexIdx; i++) {
            const v = currentVertices[i];
            
            // 점 뒤에 배경 빛 효과
            const glow = ctx.createRadialGradient(v.x, v.y, 0, v.x, v.y, 10);
            glow.addColorStop(0, 'rgba(3, 217, 217, 0.4)');
            glow.addColorStop(1, 'rgba(3, 217, 217, 0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(v.x, v.y, 10, 0, Math.PI * 2);
            ctx.fill();

            // 점 그리기
            ctx.fillStyle = '#04ADC0';
            ctx.beginPath();
            ctx.arc(v.x, v.y, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // 테두리
            ctx.strokeStyle = '#FFF';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        requestAnimationFrame(draw);
    }

    function restartAnimation() {
        vertexProgress = 0;
        edgeProgress = 0;
    }

    draw();
</script>

</body>
</html>
