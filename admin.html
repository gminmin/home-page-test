<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 대시보드 – 진부중학교 3D 동아리</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-body">

  <!-- 로그인 오버레이 -->
  <div id="login-overlay" class="admin-login-overlay">
    <div class="admin-login-card">
      <h2>관리자 로그인</h2>
      <p style="margin-bottom: 1.5rem; color: #64748b; font-size: 0.9rem;">동아리 관리자 계정으로 로그인하세요.</p>
      <input type="email" id="admin-email" placeholder="이메일 (예: admin@example.com)" />
      <input type="password" id="admin-password" placeholder="비밀번호를 입력하세요" />
      <button id="login-btn" class="btn btn-primary" style="width: 100%; justify-content: center;">로그인</button>
      <p id="login-error" style="color: #ef4444; font-size: 0.85rem; margin-top: 1rem; display: none;">비밀번호가 일치하지 않습니다.</p>
    </div>
  </div>

  <!-- 메인 대시보드 레이아웃 -->
  <div id="admin-container" class="admin-container" style="display: none;">
    <!-- 사이드바 -->
    <aside class="admin-sidebar">
      <div class="admin-logo">JB3D ADMIN</div>
      <ul class="admin-nav">
        <li><a href="#" class="nav-link active" data-target="dashboard">대시보드</a></li>
        <li><a href="#" class="nav-link" data-target="notices">공지사항 관리</a></li>
        <li><a href="#" class="nav-link" data-target="works">작품 관리</a></li>
        <li><a href="#" class="nav-link" data-target="gallery">갤러리 관리</a></li>
      </ul>
      <div style="margin-top: auto;">
        <button id="logout-btn" class="btn btn-outline" style="width: 100%; font-size: 0.8rem; border-color: rgba(255,255,255,0.1); color: #94a3b8;">로그아웃</button>
      </div>
    </aside>

    <!-- 콘텐츠 영역 -->
    <main class="admin-main">
      <header class="admin-header">
        <h1 id="page-title">대시보드</h1>
        <div class="admin-user-info" style="font-size: 0.9rem; font-weight: 600;">관리자님, 환영합니다.</div>
      </header>

      <!-- 섹션 1: 대시보드 홈 -->
      <section id="section-dashboard" class="admin-section">
        <div class="admin-stats">
          <div class="stat-widget">
            <span class="label">전체 공지사항</span>
            <div class="value" id="stat-notices">0</div>
          </div>
          <div class="stat-widget">
            <span class="label">등록된 작품</span>
            <div class="value" id="stat-works">0</div>
          </div>
          <div class="stat-widget">
            <span class="label">갤러리 아이템</span>
            <div class="value" id="stat-gallery">0</div>
          </div>
        </div>
        <div class="admin-content-card">
          <h3>최근 활동 내역</h3>
          <p style="color: #64748b; margin-top: 0.5rem;">홈페이지의 전체적인 현황을 관리할 수 있습니다.</p>
        </div>
      </section>

      <!-- 섹션 2: 공지사항 관리 -->
      <section id="section-notices" class="admin-section" style="display: none;">
        <div class="admin-content-card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h3>공지사항 목록</h3>
            <button class="btn btn-primary btn-sm" onclick="toggleForm('notice-form')">+ 새 공지 등록</button>
          </div>

          <form id="notice-form" class="modal-form" style="display: none;">
            <input type="text" id="notice-title" placeholder="공지 제목" required />
            <textarea id="notice-content" placeholder="공지 내용" rows="4" required></textarea>
            <div style="display: flex; gap: 0.5rem;">
              <button type="submit" class="btn btn-primary">저장</button>
              <button type="button" class="btn btn-outline" onclick="toggleForm('notice-form')">취소</button>
            </div>
          </form>

          <table class="admin-table">
            <thead>
              <tr>
                <th>날짜</th>
                <th>제목</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="notice-list-body">
              <!-- 데이터 로드 영역 -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- 섹션 3: 작품 관리 -->
      <section id="section-works" class="admin-section" style="display: none;">
        <div class="admin-content-card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h3>작품 목록</h3>
            <button class="btn btn-primary btn-sm" onclick="toggleForm('work-form')">+ 새 작품 등록</button>
          </div>

          <form id="work-form" class="modal-form" style="display: none;">
            <input type="text" id="work-title" placeholder="작품 이름" required />
            <input type="text" id="work-category" placeholder="카테고리 (예: 캐릭터, 배경)" required />
            <input type="text" id="work-author" placeholder="제작자" required />
            <div style="font-size: 0.85rem; color: #64748b;">작품 이미지 업로드:</div>
            <input type="file" id="work-file" accept="image/*" required />
            <div style="display: flex; gap: 0.5rem;">
              <button type="submit" class="btn btn-primary">저장</button>
              <button type="button" class="btn btn-outline" onclick="toggleForm('work-form')">취소</button>
            </div>
          </form>

          <table class="admin-table">
            <thead>
              <tr>
                <th>카테고리</th>
                <th>작품명</th>
                <th>제작자</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="work-list-body">
            </tbody>
          </table>
        </div>
      </section>

      <!-- 섹션 4: 갤러리 관리 -->
      <section id="section-gallery" class="admin-section" style="display: none;">
        <div class="admin-content-card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h3>갤러리 목록</h3>
            <button class="btn btn-primary btn-sm" onclick="toggleForm('gallery-form')">+ 새 이미지/영상 등록</button>
          </div>

          <form id="gallery-form" class="modal-form" style="display: none;">
            <select id="gallery-type">
              <option value="photo">사진</option>
              <option value="video">영상</option>
            </select>
            <input type="text" id="gallery-title" placeholder="제목" required />
            <input type="date" id="gallery-date" required />
            <div style="font-size: 0.85rem; color: #64748b;">파일 업로드 (사진/영상):</div>
            <input type="file" id="gallery-file" accept="image/*,video/*" required />
            <div style="display: flex; gap: 0.5rem;">
              <button type="submit" class="btn btn-primary">저장</button>
              <button type="button" class="btn btn-outline" onclick="toggleForm('gallery-form')">취소</button>
            </div>
          </form>

          <table class="admin-table">
            <thead>
              <tr>
                <th>타입</th>
                <th>제목</th>
                <th>날짜</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="gallery-list-body">
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="dataService.js"></script>
  <script src="admin.js"></script>
</body>
</html>
